services:
  sql:
    image: ghcr.io/hanzoai/sql:latest
    container_name: treasury-sql
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: treasury
      POSTGRES_PASSWORD: treasury
      POSTGRES_DB: treasury
    volumes:
      - sql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treasury"]
      interval: 5s
      timeout: 5s
      retries: 5

  kv:
    image: ghcr.io/hanzoai/kv:latest
    container_name: treasury-kv
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  treasuryd:
    build: .
    container_name: treasuryd
    ports:
      - "8091:8091"
    environment:
      TREASURY_LISTEN: ":8091"
      DATABASE_URL: postgres://treasury:treasury@sql:5432/treasury?sslmode=disable
    depends_on:
      sql:
        condition: service_healthy

volumes:
  sql-data:
